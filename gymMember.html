<style>
  * { -webkit-font-smoothing: antialiased; }
  html, body { background: #08080A; color: #EDEDEF; font-family: 'Inter', sans-serif; }
  body { overflow-x: hidden; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #0A0A0B; }
  ::-webkit-scrollbar-thumb { background: #26262C; border-radius: 6px; border: 2px solid #0A0A0B; }
  ::-webkit-scrollbar-thumb:hover { background: #34343C; }

  .font-display { font-family: 'Space Grotesk', sans-serif; }

  /* Glassmorphism */
  .glass {
    background: rgba(19, 19, 22, 0.6);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }
  .glass-strong {
    background: rgba(15, 15, 18, 0.85);
    backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  /* Gradient text */
  .text-gradient-lime {
    background: linear-gradient(135deg, #D4FF3F 0%, #B8E62E 50%, #8FB821 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .text-gradient-fire {
    background: linear-gradient(135deg, #FF6B35 0%, #FF8A5C 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Grid pattern */
  .bg-grid {
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(212, 255, 63, 0.5); }
    70% { box-shadow: 0 0 0 18px rgba(212, 255, 63, 0); }
    100% { box-shadow: 0 0 0 0 rgba(212, 255, 63, 0); }
  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .animate-fade-up { animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .animate-fade-in { animation: fadeIn 0.6s ease both; }
  .animate-scale-in { animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .animate-slide-right { animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .animate-float { animation: float 6s ease-in-out infinite; }
  .animate-pulse-ring { animation: pulse-ring 2s infinite; }

  /* Button effects */
  .btn-primary {
    background: linear-gradient(135deg, #D4FF3F 0%, #B8E62E 100%);
    color: #0A0A0B;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px -8px rgba(212, 255, 63, 0.5);
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.4) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }
  .btn-primary:hover::after { transform: translateX(100%); }

  .btn-ghost {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.3s ease;
  }
  .btn-ghost:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
  }

  /* Card hover */
  .card-hover {
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .card-hover:hover {
    transform: translateY(-4px);
    border-color: rgba(212, 255, 63, 0.3);
    box-shadow: 0 20px 50px -20px rgba(212, 255, 63, 0.2);
  }

  /* Sidebar item */
  .sidebar-item {
    transition: all 0.25s ease;
    position: relative;
  }
  .sidebar-item.active {
    background: linear-gradient(90deg, rgba(212, 255, 63, 0.12) 0%, transparent 100%);
    color: #D4FF3F;
  }
  .sidebar-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 8px;
    bottom: 8px;
    width: 3px;
    background: #D4FF3F;
    border-radius: 0 3px 3px 0;
  }
  .sidebar-item:hover { background: rgba(255,255,255,0.04); }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* Toggle */
  .toggle-switch {
    position: relative;
    width: 44px;
    height: 24px;
    background: #26262C;
    border-radius: 12px;
    transition: background 0.3s ease;
    cursor: pointer;
  }
  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 20px;
    height: 20px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .toggle-switch.on { background: #D4FF3F; }
  .toggle-switch.on::after { transform: translateX(20px); background: #0A0A0B; }

  /* Table */
  .data-table tbody tr {
    transition: background 0.2s ease;
  }
  .data-table tbody tr:hover {
    background: rgba(255,255,255,0.025);
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  /* Toast */
  .toast {
    animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .toast.out { animation: slideInRight 0.3s reverse both; }

  /* Modal */
  .modal-backdrop { animation: fadeIn 0.25s ease both; }
  .modal-panel { animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both; }

  /* Before/After slider */
  .ba-slider {
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    user-select: none;
  }
  .ba-after {
    position: absolute;
    inset: 0;
    width: 50%;
    overflow: hidden;
  }
  .ba-handle {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 3px;
    background: #D4FF3F;
    transform: translateX(-50%);
    cursor: ew-resize;
  }
  .ba-handle::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #D4FF3F;
    box-shadow: 0 0 0 6px rgba(212, 255, 63, 0.2);
  }

  /* Tooltip */
  .has-tooltip { position: relative; }
  .has-tooltip:hover .tooltip { opacity: 1; transform: translateY(0); }
  .tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: #0A0A0B;
    border: 1px solid #26262C;
    color: #EDEDEF;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s ease;
    z-index: 50;
  }

  /* Page transition */
  .page-enter { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }

  /* Custom radio/checkbox */
  .checkbox-custom {
    width: 18px; height: 18px;
    border: 1.5px solid #34343C;
    border-radius: 4px;
    background: #17171B;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
  }
  .checkbox-custom.checked {
    background: #D4FF3F;
    border-color: #D4FF3F;
  }
  .checkbox-custom.checked::after {
    content: '\f00c';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    color: #0A0A0B;
    font-size: 10px;
  }

  /* Mobile menu transition */
  .mobile-menu { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

  /* Star rating */
  .star { color: #34343C; transition: color 0.2s; cursor: pointer; }
  .star.active { color: #D4FF3F; }

  /* Command palette */
  .cmd-item { transition: background 0.15s ease; }
  .cmd-item.active, .cmd-item:hover { background: rgba(212, 255, 63, 0.1); color: #D4FF3F; }

  /* Pillar accent line */
  .accent-line::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: #D4FF3F;
    margin-right: 12px;
    vertical-align: middle;
  }

  /* Spotlight gradient */
  .spotlight {
    background: radial-gradient(800px circle at 50% 0%, rgba(212, 255, 63, 0.08), transparent 70%);
  }

  /* Glow orb */
  .glow-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    pointer-events: none;
  }

  /* Circular progress */
  .circ-progress { transform: rotate(-90deg); }
  .circ-progress circle { transition: stroke-dashoffset 1.5s cubic-bezier(0.16, 1, 0.3, 1); }
</style>
</head>

// ============== NAVIGATION ==============
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  const isOpen = !sb.classList.contains('-translate-x-full');
  if (isOpen) {
    sb.classList.add('-translate-x-full');
    ov.classList.add('hidden');
  } else {
    sb.classList.remove('-translate-x-full');
    ov.classList.remove('hidden');
  }
}

function navigateMember(page) {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  if (event && event.currentTarget) event.currentTarget.classList.add('active');

  const content = document.getElementById('memberContent');
  content.innerHTML = '';
  content.classList.remove('page-enter');
  void content.offsetWidth;
  content.classList.add('page-enter');

  const pages = {
    dashboard: renderMemberDashboard,
    profile: renderProfile,
    membership: renderMembership,
    trainer: renderTrainer,
    workouts: renderWorkouts,
    library: renderLibrary,
    equipment: renderEquipment,
    nutrition: renderNutrition,
    supplements: renderSupplements,
    progress: renderProgress,
    photos: renderPhotos,
    attendance: renderMemberAttendance,
    achievements: renderAchievements,
    rewards: renderRewards,
    classes: renderMemberClasses,
    notifications: renderMemberNotifications,
    settings: renderMemberSettings,
    support: renderSupport,
  };

  const renderer = pages[page] || renderMemberDashboard;
  renderer(content);

  if (window.innerWidth < 1024) {
    document.getElementById('sidebar').classList.add('-translate-x-full');
    document.getElementById('sidebarOverlay').classList.add('hidden');
  }
}

// ============== TOAST ==============
function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info', warning: 'fa-triangle-exclamation' };
  const colors = { success: 'text-lime', error: 'text-red-400', info: 'text-blue-400', warning: 'text-ember' };
  const toast = document.createElement('div');
  toast.className = 'toast glass-strong rounded-xl px-4 py-3 flex items-center gap-3 min-w-[280px] max-w-md pointer-events-auto shadow-card';
  toast.innerHTML = `<i class="fa-solid ${icons[type]} ${colors[type]} text-lg"></i><span class="text-sm">${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('out');
    setTimeout(() => toast.remove(), 300);
  }, 3500);
}

function openModal(title, content, onSave, saveText = 'Save', saveColor = 'lime') {
  const existing = document.getElementById('modalContainer');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'modalContainer';
  modal.className = 'fixed inset-0 z-[85] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 modal-backdrop';
  modal.innerHTML = `
    <div class="glass-strong w-full max-w-2xl rounded-2xl overflow-hidden modal-panel max-h-[90vh] flex flex-col" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between px-6 py-4 border-b border-white/5">
        <h3 class="font-display font-bold text-lg">${title}</h3>
        <button onclick="closeModal()" class="w-8 h-8 rounded-lg btn-ghost flex items-center justify-center"><i class="fa-solid fa-xmark text-sm"></i></button>
      </div>
      <div class="p-6 overflow-y-auto flex-1">${content}</div>
      ${onSave ? `
      <div class="flex gap-3 px-6 py-4 border-t border-white/5 bg-ink-900/50">
        <button onclick="closeModal()" class="flex-1 btn-ghost py-2.5 rounded-lg text-sm font-medium">Cancel</button>
        <button onclick="closeModal(); (${onSave})()" class="flex-1 py-2.5 rounded-lg text-sm font-semibold ${saveColor === 'ember' ? 'bg-ember text-white hover:bg-ember-600' : 'btn-primary'}">${saveText}</button>
      </div>
      ` : ''}
    </div>
  `;
  modal.addEventListener('click', closeModal);
  document.body.appendChild(modal);
}

// ============== BEFORE/AFTER SLIDER ==============
function startDrag(e, el) {
  e.preventDefault();
  const move = (clientX) => {
    const rect = el.getBoundingClientRect();
    const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
    const pct = (x / rect.width) * 100;
    el.querySelector('.ba-after').style.width = pct + '%';
    el.querySelector('.ba-handle').style.left = pct + '%';
  };
  const onMove = (ev) => move(ev.touches ? ev.touches[0].clientX : ev.clientX);
  const onUp = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove);
  document.addEventListener('touchend', onUp);
  onMove(e.touches ? e.touches[0] : e);
}

function progressRing(percent, color, label, value) {
  const circumference = 2 * Math.PI * 56;
  const offset = circumference - (percent / 100) * circumference;
  return `
    <div class="relative w-32 h-32 flex flex-col items-center justify-center">
      <svg class="circ-progress w-full h-full absolute">
        <circle cx="64" cy="64" r="56" stroke="#26262C" stroke-width="8" fill="none" />
        <circle cx="64" cy="64" r="56" stroke="${color}" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" />
      </svg>
      <div class="text-center relative z-10">
        <div class="font-display text-2xl font-bold">${value}</div>
        <div class="text-[10px] text-white/50 uppercase tracking-wider">${label}</div>
      </div>
    </div>
  `;
}
